# .github/workflows/integration-tests.yml

name: CI - Run Integration Tests

# This workflow is triggered manually from the GitHub Actions UI.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  integration-test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    # Backstop on top of the runner's per-test timeout: the runner bounds each
    # test, this bounds the job as a whole against anything outside that logic.
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Bake bundled skill metadata
        run: python scripts/bake_skill_metadata.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # Run via the timeout-protected runner instead of bare `pytest -m
      # integration`: the HTTP client has no hard request timeout, so a single
      # unresponsive endpoint could otherwise hang the whole run. The runner
      # isolates each test in its own subprocess, kills any that overruns
      # --timeout, and reports TIMEOUT/SLOW. `--runner pytest` is required here
      # because uv is not installed in CI; deps are already importable by a bare
      # pytest after `pip install -e .[test]`.
      - name: Run integration tests
        run: python scripts/run_integration_tests.py --runner pytest --timeout 120
